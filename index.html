<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidReads V2.0 | DEV-CORE</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-green: #2ecc71;
            --dark-core: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            margin: 0; 
            font-family: 'JetBrains Mono', 'Fira Code', monospace; 
            background-color: var(--dark-core); 
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            padding: 50px 20px 40px;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .dev-badge {
            font-size: 0.7rem;
            background: rgba(0, 210, 255, 0.1);
            color: var(--neon-blue);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }

        .v2-title {
            font-size: 3.2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .v2-title span { color: var(--neon-blue); -webkit-text-fill-color: var(--neon-blue); }

        .nav-system { display: flex; gap: 20px; margin: 25px 0; }
        .nav-link {
            text-decoration: none; color: var(--text-dim);
            font-size: 0.85rem; padding: 10px 25px; border-radius: 8px;
            transition: 0.3s; border: 1px solid transparent;
        }
        .nav-link.active { color: var(--neon-blue); border-color: var(--neon-blue); background: rgba(0,210,255,0.05); }

        /* --- MAX CONTROLS --- */
        .dev-controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        
        select, .sync-label, .clear-btn {
            background: #1e293b; color: white; border: 1px solid #334155;
            padding: 12px 18px; border-radius: 8px; outline: none; font-family: inherit;
            font-size: 0.8rem; cursor: pointer; transition: 0.2s;
        }

        select:hover { border-color: var(--neon-blue); }
        .sync-label { color: var(--neon-green); border-color: var(--neon-green); background: rgba(46, 204, 113, 0.05); }
        .sync-label:hover { background: rgba(46, 204, 113, 0.15); }
        .clear-btn { color: #ef4444; border-color: #ef4444; display: none; }

        /* --- GRID & CARDS --- */
        #bookGrid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px; padding: 50px; max-width: 1400px; margin: 0 auto;
        }

        .book-card {
            background: #1e293b; border-radius: 12px; overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
            position: relative;
        }

        .book-card:hover { transform: translateY(-10px); border-color: var(--neon-blue); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .book-card.is-personal { border-color: var(--neon-green); box-shadow: 0 0 20px rgba(46, 204, 113, 0.15); }

        .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; transition: 0.3s; }
        .book-card:hover img { filter: brightness(1.1); }
        
        .book-info { padding: 18px; }
        .book-info h4 { margin: 0; font-size: 0.95rem; color: #f1f5f9; height: 2.6rem; overflow: hidden; line-height: 1.3; }
        .book-info p { margin: 10px 0; font-size: 0.75rem; color: var(--neon-blue); font-weight: 600; letter-spacing: 0.5px; }

        .badge-row { display: flex; gap: 6px; margin-top: 12px; }
        .badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 4px; border: 1px solid #334155; color: #64748b; text-transform: uppercase; font-weight: 700; }

        .loading-zone { text-align: center; padding: 80px; color: var(--text-dim); font-size: 0.9rem; grid-column: 1/-1; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <div class="dev-badge">DEV-BUILD V4.04 - PURIFIED</div>
    <h1 class="v2-title">KidReads <span>MAX</span></h1>
    
    <nav class="nav-system">
        <a href="devmax.html" class="nav-link active">//BROWSE_LIBRARY</a>
        <a href="searchtheworld.html" class="nav-link">//GLOBAL_QUERY</a>
    </nav>

    <div class="dev-controls">
        <select id="ageSelect">
            <option value="1-4">AGE_01-04_EARLY</option>
            <option value="5-8">AGE_05-08_READER</option>
            <option value="9-12" selected>AGE_09-12_MIDDLE</option>
            <option value="13+">AGE_13+_YA_DEEP</option>
        </select>
        <select id="genreSelect">
            <option value="">ALL_GENRES</option>
            <option value="Adventure">ADVENTURE</option>
            <option value="Science">STEM_DATA</option>
            <option value="Graphic Novel">GRAPHIC_CORE</option>
            <option value="Fantasy">FANTASY_REALM</option>
            <option value="Mystery">MYSTERY_DECRYPT</option>
        </select>
        <label for="gr-upload" class="sync-label" id="syncStatus">SYNC_GOODREADS</label>
        <button id="clearSync" class="clear-btn">PURGE_DATA</button>
        <input type="file" id="gr-upload" accept=".csv" style="display:none">
    </div>
</header>

<main id="bookGrid"></main>

<script>
let allBooks = [];
let filteredBooks = [];
let personalISBNs = JSON.parse(localStorage.getItem('kr_dev_isbns')) || [];
let displayedCount = 0;
const BATCH_SIZE = 40;

const grid = document.getElementById('bookGrid');
const syncStatus = document.getElementById('syncStatus');
const clearBtn = document.getElementById('clearSync');

function updateSyncUI() {
    if(personalISBNs.length > 0) {
        syncStatus.innerText = "DATA_PERSONALIZED";
        syncStatus.style.borderColor = "var(--neon-green)";
        clearBtn.style.display = "block";
    } else {
        syncStatus.innerText = "SYNC_GOODREADS";
        syncStatus.style.borderColor = "#334155";
        clearBtn.style.display = "none";
    }
}

document.getElementById('gr-upload').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
        const matches = event.target.result.match(/(?:978|979)\d{10}/g);
        if (matches) {
            personalISBNs = [...new Set(matches)];
            localStorage.setItem('kr_dev_isbns', JSON.stringify(personalISBNs));
            updateSyncUI();
            updateFilter();
        }
    };
    reader.readAsText(e.target.files[0]);
};

clearBtn.onclick = () => {
    if(confirm("EXECUTE PURGE: Clear local personalization data?")) {
        personalISBNs = [];
        localStorage.removeItem('kr_dev_isbns');
        updateSyncUI();
        updateFilter();
    }
};

async function init() {
    updateSyncUI();
    grid.innerHTML = '<div class="loading-zone">CORE_SYNC_IN_PROGRESS...</div>';
    try {
        const res = await fetch('mega_14k_kids.json');
        allBooks = await res.json();
        updateFilter();
    } catch(e) { grid.innerHTML = "<div class='loading-zone'>DB_SYNC_ERROR: Check mega_14k_kids.json path.</div>"; }
}

function updateFilter() {
    grid.innerHTML = '';
    displayedCount = 0;
    
    const age = document.getElementById('ageSelect').value;
    const genre = document.getElementById('genreSelect').value.toLowerCase();
    
    const ageMap = {
        "1-4": ["pre-k", "picture book", "k", "board books"],
        "5-8": ["grade 1", "grade 2", "grade 3", "early reader", "grades k-2"],
        "9-12": ["grade 4", "grade 5", "grade 6", "middle grade", "grades 4-7"],
        "13+": ["grade 7", "grade 8", "ya", "teen", "grades 7-12"]
    };

    filteredBooks = allBooks.filter(b => {
        const matchesGenre = !genre || (b.genre || "").toLowerCase().includes(genre);
        const level = (b.reading_level || "").toLowerCase();
        const matchesAge = ageMap[age].some(term => level.includes(term)) || level === "general";
        
        const isbnMatch = (b.cover || "").match(/isbn\/(\d{13})/);
        const isPersonal = isbnMatch && personalISBNs.includes(isbnMatch[1]);
        return (matchesGenre && matchesAge) || isPersonal;
    });

    filteredBooks.sort((a, b) => {
        const aISBN = (a.cover || "").match(/isbn\/(\d{13})/);
        const bISBN = (b.cover || "").match(/isbn\/(\d{13})/);
        const aFav = aISBN && personalISBNs.includes(aISBN[1]);
        const bFav = bISBN && personalISBNs.includes(bISBN[1]);
        return bFav - aFav;
    });

    loadMore();
}

function loadMore() {
    const batch = filteredBooks.slice(displayedCount, displayedCount + BATCH_SIZE);
    batch.forEach(book => {
        const isbn = (book.cover || "").match(/isbn\/(\d{13})/);
        const isFav = isbn && personalISBNs.includes(isbn[1]);
        
        const card = document.createElement('div');
        card.className = `book-card ${isFav ? 'is-personal' : ''}`;
        card.onclick = () => {
            const link = isbn ? `https://books.google.com/books?vid=ISBN${isbn[1]}` : `https://books.google.com/books?q=${encodeURIComponent(book.title)}`;
            window.open(link, '_blank');
        };
        
        card.innerHTML = `
            <img src="${book.cover}" loading="lazy">
            <div class="book-info">
                <h4>${book.title} ${isFav ? '✨' : ''}</h4>
                <p>${book.author === 'Unknown' ? 'SYSTEM_NULL' : book.author.toUpperCase()}</p>
                <div class="badge-row">
                    <span class="badge">${book.genre || 'DATA'}</span>
                    <span class="badge">${book.reading_level || 'GEN'}</span>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
    displayedCount += BATCH_SIZE;
}

window.onscroll = () => {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
        if (displayedCount < filteredBooks.length) loadMore();
    }
};

document.getElementById('ageSelect').onchange = updateFilter;
document.getElementById('genreSelect').onchange = updateFilter;
init();
</script>
</body>
</html>
