<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidReads | MAX Browse</title>
    <style>
        :root {
            --primary: #4a90e2;
            --primary-dark: #357abd;
            --bg-body: #f0f2f5; 
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --glass: rgba(255, 255, 255, 0.2);
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); }

        header {
            padding: 40px 20px; text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; gap: 20px; 
        }

        header h1 { margin: 0; font-size: 3rem; font-weight: 900; letter-spacing: -1.5px; }

        .app-toggle { display: flex; gap: 10px; }
        .toggle-container { background: rgba(255, 255, 255, 0.2); padding: 5px; border-radius: 50px; display: flex; }
        .toggle-btn { text-decoration: none; padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; font-weight: 700; color: white; }
        .toggle-btn.active { background: white; color: var(--primary-dark); }

        .controls { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        select { padding: 12px 20px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.3); background: var(--glass); backdrop-filter: blur(10px); color: white; font-weight: 600; cursor: pointer; }
        select option { color: black; }

        #bookGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 35px; padding: 50px 40px; max-width: 1400px; margin: 0 auto; }
        .book-card { background: var(--card-bg); border-radius: 20px; box-shadow: var(--shadow); transition: transform 0.3s ease; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; }
        .book-card:hover { transform: translateY(-10px); }
        .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #eee; }
        .book-info { padding: 20px; }
        .book-info h4 { margin: 0; font-size: 1.1rem; height: 2.8rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .book-info p { margin: 10px 0 0; font-size: 0.85rem; color: var(--primary); font-weight: bold; }

        .badge { font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; margin-top: 10px; display: inline-block; background: #e1f5fe; color: #0288d1; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; max-width: 800px; width: 100%; display: flex; overflow: hidden; position: relative; max-height: 90vh; }
        .modal-close { position: absolute; top: 15px; right: 15px; border: none; background: #eee; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .modal-img { width: 40%; background: #f8f9fa; padding: 40px; display: flex; align-items: center; }
        .modal-img img { width: 100%; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .modal-details { width: 60%; padding: 40px; overflow-y: auto; }
        .modal-details h2 { margin: 0; font-size: 1.8rem; }
        .modal-summary { font-size: 1rem; line-height: 1.6; color: var(--text-muted); margin-top: 20px; }
        .modal-btn { display: inline-block; margin-top: 25px; padding: 15px 25px; background: var(--primary); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; }

        @media (max-width: 600px) { .modal-content { flex-direction: column; } .modal-img, .modal-details { width: 100%; } }
    </style>
</head>
<body>

<header>
    <div class="app-toggle">
        <div class="toggle-container">
            <a href="index.html" class="toggle-btn active">MAX Browse</a>
            <a href="maxsearch.html" class="toggle-btn">Global Search</a>
        </div>
    </div>
    <h1>📚 KidReads MAX</h1>
    <div class="controls">
        <select id="ageSelect">
            <option value="">All Ages</option>
            <option value="Pre-K">Pre-K</option>
            <option value="1 - 3">Grades 1-3</option>
            <option value="2 - 5" selected>Grades 2-5</option>
            <option value="4 - 7">Grades 4-7</option>
            <option value="7 - 12">Teens</option>
        </select>
        <select id="genreSelect">
            <option value="">All Genres</option>
            <option value="Adventure">Adventure</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Mystery">Mystery</option>
            <option value="Humor">Humor</option>
            <option value="Graphic Novel">Graphic Novels</option>
            <option value="Scary">Scary</option>
            <option value="Animals">Animals</option>
        </select>
    </div>
</header>

<main id="bookGrid"></main>

<div id="bookModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-img"><img id="mCover" src=""></div>
        <div class="modal-details">
            <h2 id="mTitle"></h2>
            <div id="mAuthor" style="color:var(--primary); font-weight:bold; margin-top:5px;"></div>
            <div id="mSummary" class="modal-summary"></div>
            <a id="mLink" href="#" target="_blank" class="modal-btn">🔍 View Source</a>
        </div>
    </div>
</div>

<script>
let allBooks = [];
let displayedCount = 0;
const LOAD_BATCH = 40;

// Filters out Scholastic marketing phrases
function cleanSummary(text) {
    if (!text) return "No description available.";
    return text
        .replace(/Pick a book\. Grow a Reader!.*/gi, '')
        .replace(/This series is part of Scholastic's early reader line.*/gi, '')
        .replace(/Show More/gi, '')
        .trim();
}

async function init() {
    try {
        const response = await fetch('CLibrary_Final_Gold.json'); 
        allBooks = await response.json();
        updateFilter();
    } catch (e) {
        document.getElementById('bookGrid').innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:100px;'>⚠️ <b>Error:</b> CLibrary_Final_Gold.json not found.</div>";
    }
}

function updateFilter() {
    const grid = document.getElementById('bookGrid');
    grid.innerHTML = "";
    displayedCount = 0;
    
    const age = document.getElementById('ageSelect').value;
    const genre = document.getElementById('genreSelect').value.toLowerCase();

    const filtered = allBooks.filter(b => {
        const matchesGenre = genre === "" || (b.genre || "").toLowerCase().includes(genre);
        const matchesAge = age === "" || (b.reading_level || "").includes(age);
        return matchesGenre && matchesAge;
    });

    renderBatch(filtered);
    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            renderBatch(filtered);
        }
    };
}

function renderBatch(list) {
    const grid = document.getElementById('bookGrid');
    const nextBatch = list.slice(displayedCount, displayedCount + LOAD_BATCH);
    nextBatch.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.onclick = () => {
            document.getElementById('mTitle').innerText = book.title;
            document.getElementById('mAuthor').innerText = `By ${book.author}`;
            document.getElementById('mCover').src = book.cover;
            document.getElementById('mSummary').innerText = cleanSummary(book.summary);
            document.getElementById('mLink').href = book.url;
            document.getElementById('bookModal').classList.add('active');
        };
        card.innerHTML = `<img src="${book.cover}"><div class="book-info"><h4>${book.title}</h4><p>${book.author}</p><span class="badge">${book.reading_level}</span></div>`;
        grid.appendChild(card);
    });
    displayedCount += LOAD_BATCH;
}

function closeModal() { document.getElementById('bookModal').classList.remove('active'); }

init();
</script>
</body>
</html>
