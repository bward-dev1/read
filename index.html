<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidReads | MAX Browse</title>
    <style>
        :root {
            --primary: #4a90e2; --primary-dark: #357abd; --bg-body: #f0f2f5; 
            --card-bg: #ffffff; --text-main: #2d3436; --text-muted: #636e72;
            --glass: rgba(255, 255, 255, 0.15); --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); }
        
        header { 
            padding: 50px 20px; text-align: center; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4a00e0 100%); 
            color: white; display: flex; flex-direction: column; align-items: center; gap: 25px; 
        }
        
        .app-toggle { 
            display: flex; align-items: center; gap: 10px; 
            background: var(--glass); padding: 6px; border-radius: 50px; backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.2); 
        }
        
        .toggle-btn, .sync-label { 
            text-decoration: none; padding: 10px 22px; border-radius: 40px; 
            font-size: 0.85rem; font-weight: 700; color: white; border: none; cursor: pointer; 
            background: transparent; transition: all 0.3s ease; 
        }
        
        .toggle-btn.active { background: white; color: var(--primary-dark); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .sync-label { background: rgba(46, 204, 113, 0.3); border: 1px solid rgba(255,255,255,0.2); }
        .clear-btn { background: rgba(231, 76, 60, 0.3); border: none; color: white; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: none; margin-left: 5px; font-weight: bold; }
        
        .controls { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        select { 
            padding: 14px 24px; border-radius: 16px; background: var(--glass); 
            border: 1px solid rgba(255, 255, 255, 0.3); color: white; font-weight: 600; 
            outline: none; cursor: pointer; transition: 0.3s;
        }
        select:hover { background: rgba(255,255,255,0.25); }
        select option { color: #333; }

        #bookGrid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 35px; padding: 40px; max-width: 1400px; margin: 0 auto; 
        }
        
        .book-card { 
            background: var(--card-bg); border-radius: 24px; box-shadow: var(--shadow); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            overflow: hidden; cursor: pointer; display: flex; flex-direction: column; height: 100%;
        }
        .book-card:hover { transform: translateY(-12px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        .book-info { padding: 22px; flex-grow: 1; display: flex; flex-direction: column; }
        .book-info h4 { margin: 0; font-size: 1.1rem; line-height: 1.4; min-height: 2.8rem; font-weight: 800; }
        .book-info p { margin: 8px 0 0 0; font-size: 0.9rem; color: var(--text-muted); }
        .find-link { color: #4a90e2 !important; font-weight: bold; }

        .badge-container { display: flex; gap: 6px; margin-top: auto; padding-top: 18px; flex-wrap: wrap; }
        .badge { font-size: 0.65rem; font-weight: 800; padding: 5px 10px; border-radius: 8px; text-transform: uppercase; }
        .genre-badge { background: #e3f2fd; color: #1976d2; }
        .level-badge { background: #f1f8e9; color: #388e3c; }
        .error-msg { grid-column: 1/-1; text-align: center; padding: 100px; color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <nav class="app-toggle">
        <a href="index.html" class="toggle-btn active">MAX Browse</a>
        <a href="maxsearch.html" class="toggle-btn">Global Search</a>
        <div style="border-left: 1px solid rgba(255,255,255,0.2); margin-left: 5px; padding-left: 10px; display: flex; align-items: center;">
            <label for="gr-upload" class="sync-label" id="syncStatus">✨ Sync Goodreads</label>
            <button id="clearSync" class="clear-btn" onclick="clearData()">❌</button>
            <input type="file" id="gr-upload" accept=".csv" style="display:none">
        </div>
    </nav>
    <h1>📚 KidReads MAX</h1>
    <div class="controls">
        <select id="ageSelect">
            <option value="1-4">Ages 1-4</option>
            <option value="5-8">Ages 5-8</option>
            <option value="9-12" selected>Ages 9-12</option>
            <option value="13+">Teens 13+</option>
        </select>
        <select id="genreSelect">
            <option value="">All Genres</option>
            <option value="Adventure">Adventure</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Graphic Novel">Graphic Novels</option>
            <option value="Mystery">Mystery</option>
            <option value="Humor">Humor</option>
            <option value="Science">Science/STEM</option>
        </select>
    </div>
</header>

<main id="bookGrid"></main>

<script>
let allBooks = [];
let filteredBooks = [];
let personalISBNs = JSON.parse(localStorage.getItem('kidreads_isbns')) || [];
let displayedCount = 0;
const LOAD_BATCH = 40;

async function init() {
    updateUIStatus();
    try {
        const res = await fetch('mega_14k_kids.json');
        if (!res.ok) throw new Error("Could not find mega_14k_kids.json");
        const raw = await res.json();
        
        const seen = new Set();
        allBooks = raw.filter(b => {
            if (!b.title || !b.cover) return false;
            const key = b.title.toLowerCase().trim();
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });
        
        updateFilter();
    } catch (e) {
        document.getElementById('bookGrid').innerHTML = `<div class="error-msg">⚠️ Error: ${e.message}<br>Make sure the file is uploaded to GitHub!</div>`;
    }
}

function updateUIStatus() {
    const status = document.getElementById('syncStatus');
    const clear = document.getElementById('clearSync');
    if(personalISBNs.length > 0) {
        status.innerText = "✅ Library Personalised!";
        status.style.background = "#2ecc71";
        clear.style.display = "block";
    } else {
        status.innerText = "✨ Sync Goodreads";
        status.style.background = "rgba(46, 204, 113, 0.3)";
        clear.style.display = "none";
    }
}

document.getElementById('gr-upload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        setTimeout(() => {
            const matches = event.target.result.match(/(?:978|979)\d{10}/g) || [];
            personalISBNs = [...new Set(matches)];
            localStorage.setItem('kidreads_isbns', JSON.stringify(personalISBNs));
            location.reload();
        }, 100);
    };
    reader.readAsText(file);
});

function clearData() {
    if(confirm("Reset personalized data?")) {
        localStorage.removeItem('kidreads_isbns');
        location.reload();
    }
}

function updateFilter() {
    const grid = document.getElementById('bookGrid');
    grid.innerHTML = "";
    displayedCount = 0;
    const age = document.getElementById('ageSelect').value;
    const genre = document.getElementById('genreSelect').value;
    
    const ageMap = {
        "1-4": ["k", "pre-k", "picture", "board"],
        "5-8": ["grade 1", "grade 2", "grade 3", "early", "k-2", "k-3"],
        "9-12": ["grade 4", "grade 5", "grade 6", "middle", "2-5", "4-7", "3-7"],
        "13+": ["grade 7", "grade 8", "ya", "teen", "5-12", "7-12"]
    };

    filteredBooks = allBooks.filter(book => {
        const matchesGenre = !genre || book.genre === genre;
        const level = (book.reading_level || "").toLowerCase();
        const matchesAge = ageMap[age].some(term => level.includes(term));
        const isbn = (book.cover.match(/isbn\/(\d{13})/) || [])[1];
        const isFav = isbn && personalISBNs.includes(isbn);
        return (matchesGenre && matchesAge) || isFav;
    });

    filteredBooks.sort((a, b) => {
        const aIsbn = (a.cover.match(/isbn\/(\d{13})/) || [])[1];
        const bIsbn = (b.cover.match(/isbn\/(\d{13})/) || [])[1];
        return (personalISBNs.includes(bIsbn) ? 1 : 0) - (personalISBNs.includes(aIsbn) ? 1 : 0);
    });

    loadMore();
}

function loadMore() {
    const grid = document.getElementById('bookGrid');
    const nextBatch = filteredBooks.slice(displayedCount, displayedCount + LOAD_BATCH);
    nextBatch.forEach(book => {
        const isbn = (book.cover.match(/isbn\/(\d{13})/) || [])[1];
        const isFav = isbn && personalISBNs.includes(isbn);
        const card = document.createElement('div');
        card.className = 'book-card';
        if (isFav) card.style.border = "3px solid #2ecc71";
        
        card.innerHTML = `
            <img src="${book.cover}" alt="Cover">
            <div class="book-info">
                <h4>${book.title} ${isFav ? '✨' : ''}</h4>
                <p class="${book.author === 'Unknown' ? 'find-link' : ''}">${book.author === 'Unknown' ? '✨ Find on Google Books' : book.author}</p>
                <div class="badge-container">
                    <span class="badge genre-badge">${book.genre}</span>
                    <span class="badge level-badge">${book.reading_level}</span>
                </div>
            </div>`;

        card.onclick = () => {
            const query = encodeURIComponent(`${book.title} ${book.author !== 'Unknown' ? book.author : ''}`);
            window.open(`https://www.google.com/search?tbm=bks&q=${query}`, '_blank');
        };
        grid.appendChild(card);
    });
    displayedCount += LOAD_BATCH;
}

window.onscroll = () => { if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) { if (displayedCount < filteredBooks.length) loadMore(); } };
document.getElementById('ageSelect').onchange = updateFilter;
document.getElementById('genreSelect').onchange = updateFilter;
init();
</script>
</body>
</html>
