<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidReads | MAX Browse</title>
<style>
:root {
    --primary: #4a90e2; --primary-dark: #357abd; --bg-body: #f0f2f5; 
    --card-bg: #ffffff; --text-main: #2d3436; --text-muted: #636e72;
    --glass: rgba(255, 255, 255, 0.15); --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}
body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); }
header {
    padding: 40px 20px; text-align: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4a00e0 100%);
    color: white; display: flex; flex-direction: column; align-items: center; gap: 20px; 
}
.app-toggle {
    display: flex; align-items: center; gap: 10px; 
    background: var(--glass); padding: 5px; border-radius: 50px; backdrop-filter: blur(10px);
}
.toggle-btn, .sync-label, .clear-btn {
    text-decoration: none; padding: 8px 18px; border-radius: 40px;
    font-size: 0.8rem; font-weight: 700; color: white; border: none; cursor: pointer;
    background: transparent;
}
.toggle-btn.active { background: white; color: var(--primary-dark); }
.sync-label { background: rgba(46, 204, 113, 0.3); border: 1px solid rgba(255,255,255,0.2); }
.clear-btn { background: rgba(231, 76, 60, 0.3); padding: 8px 12px; display: none; }

.controls { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
select {
    padding: 12px 20px; border-radius: 14px; background: var(--glass);
    border: 1px solid rgba(255, 255, 255, 0.3); color: white; font-weight: 600; outline: none;
}
select option { color: #333; }

#bookGrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto;
}
.book-card {
    background: var(--card-bg); border-radius: 20px; box-shadow: var(--shadow);
    transition: transform 0.3s ease; overflow: hidden; cursor: pointer;
    display: flex; flex-direction: column;
}
.book-card:hover { transform: translateY(-10px); }
.book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
.book-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
.book-info h4 { margin: 0; font-size: 1.05rem; color: var(--text-main); min-height: 2.7rem; line-height: 1.4; }
.book-info p { margin: 5px 0 0 0; font-size: 0.85rem; color: var(--text-muted); }
.find-link { color: #4a90e2 !important; font-weight: bold; }

.badge-container { display: flex; gap: 5px; margin-top: auto; padding-top: 15px; flex-wrap: wrap; }
.badge { font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; }
.genre-badge { background: #e1f5fe; color: #0288d1; }
.level-badge { background: #f1f8e9; color: #558b2f; }
.loading { text-align: center; padding: 100px; font-size: 1.5rem; color: var(--primary-dark); grid-column: 1 / -1; }
</style>
</head>
<body>

<header>
    <nav class="app-toggle">
        <a href="index.html" class="toggle-btn active">MAX Browse</a>
        <a href="maxsearch.html" class="toggle-btn">Global Search</a>
        <div style="border-left: 1px solid rgba(255,255,255,0.2); padding-left: 10px; display: flex; align-items: center;">
            <label for="gr-upload" class="sync-label" id="syncStatus">✨ Sync Goodreads</label>
            <button id="clearSync" class="clear-btn">❌</button>
            <input type="file" id="gr-upload" accept=".csv" style="display:none">
        </div>
    </nav>
    <h1>📚 KidReads MAX</h1>
    <div class="controls">
        <select id="ageSelect">
            <option value="1-4">Ages 1-4</option>
            <option value="5-8">Ages 5-8</option>
            <option value="9-12" selected>Ages 9-12</option>
            <option value="13+">Teens 13+</option>
        </select>
        <select id="genreSelect">
            <option value="">All Genres</option>
            <option value="Adventure">Adventure</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Mystery">Mystery</option>
            <option value="Graphic Novel">Graphic Novels</option>
            <option value="Humor">Humor</option>
            <option value="Science">Science/STEM</option>
        </select>
    </div>
</header>

<main id="bookGrid"></main>

<script>
let allBooks = [];
let filteredBooks = [];
let personalISBNs = JSON.parse(localStorage.getItem('kidreads_isbns')) || [];
let displayedCount = 0;
const LOAD_BATCH = 40;

const bookGrid = document.getElementById('bookGrid');
const ageSelect = document.getElementById('ageSelect');
const genreSelect = document.getElementById('genreSelect');
const syncStatus = document.getElementById('syncStatus');
const clearSync = document.getElementById('clearSync');

async function init() {
    updateUIStatus();
    try {
        const res = await fetch('mega_14k_kids.json'); // Adjusted to your scraper's filename
        const raw = await res.json();
        
        // --- Smart Deduplication ---
        const seen = new Set();
        allBooks = raw.filter(b => {
            const key = b.title.toLowerCase().trim();
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });
        
        updateFilter();
    } catch (e) {
        bookGrid.innerHTML = "<div class='loading'>Database Error. Is mega_14k_kids.json on GitHub?</div>";
    }
}

function updateUIStatus() {
    if(personalISBNs.length > 0) {
        syncStatus.innerText = "✅ Library Personalised!";
        syncStatus.style.background = "#2ecc71";
        clearSync.style.display = "block";
    } else {
        syncStatus.innerText = "✨ Sync Goodreads";
        syncStatus.style.background = "rgba(46, 204, 113, 0.3)";
        clearSync.style.display = "none";
    }
}

document.getElementById('gr-upload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    syncStatus.innerText = "🔄 Syncing Library...";
    const reader = new FileReader();
    reader.onload = function(event) {
        setTimeout(() => {
            const text = event.target.result;
            const matches = text.match(/(?:978|979)\d{10}/g) || [];
            personalISBNs = [...new Set(matches)];
            localStorage.setItem('kidreads_isbns', JSON.stringify(personalISBNs));
            updateUIStatus();
            updateFilter();
        }, 100);
    };
    reader.readAsText(file);
});

clearSync.onclick = () => {
    personalISBNs = [];
    localStorage.removeItem('kidreads_isbns');
    updateUIStatus();
    updateFilter();
};

function updateFilter() {
    bookGrid.innerHTML = "";
    displayedCount = 0;
    const age = ageSelect.value;
    const genre = genreSelect.value;
    
    // Mapping Scholastic "Grades X-Y" strings to our UI
    const ageMap = {
        "1-4": ["k", "pre-k", "picture", "board"],
        "5-8": ["grade 1", "grade 2", "grade 3", "early reader", "k-2", "k-3"],
        "9-12": ["grade 4", "grade 5", "grade 6", "middle", "2-5", "4-7", "3-7"],
        "13+": ["grade 7", "grade 8", "ya", "teen", "5-12", "7-12"]
    };

    filteredBooks = allBooks.filter(book => {
        const matchesGenre = !genre || book.genre === genre;
        const level = (book.reading_level || "").toLowerCase();
        const matchesAge = ageMap[age].some(term => level.includes(term));
        
        // Find ISBN in cover URL for personal match
        const isbn = (book.cover.match(/isbn\/(\d{13})/) || [])[1];
        const isFav = isbn && personalISBNs.includes(isbn);

        return (matchesGenre && matchesAge) || isFav;
    });

    loadMore();
}

function loadMore() {
    const nextBatch = filteredBooks.slice(displayedCount, displayedCount + LOAD_BATCH);
    nextBatch.forEach(book => {
        const isbn = (book.cover.match(/isbn\/(\d{13})/) || [])[1];
        const isFav = isbn && personalISBNs.includes(isbn);
        
        const card = document.createElement('div');
        card.className = 'book-card';
        if (isFav) card.style.border = "2px solid #2ecc71";
        
        const authorDisplay = (book.author === "Unknown") ? "✨ Find on Google Books" : book.author;
        const authorClass = (book.author === "Unknown") ? "find-link" : "";

        card.innerHTML = `
            <img src="${book.cover}" alt="Cover">
            <div class="book-info">
                <h4>${book.title} ${isFav ? '✨' : ''}</h4>
                <p class="${authorClass}">${authorDisplay}</p>
                <div class="badge-container">
                    <span class="badge genre-badge">${book.genre}</span>
                    <span class="badge level-badge">${book.reading_level}</span>
                </div>
            </div>`;

        card.onclick = () => {
            const q = encodeURIComponent(`${book.title} ${book.author !== 'Unknown' ? book.author : ''}`);
            window.open(`https://www.google.com/search?tbm=bks&q=${q}`, '_blank');
        };
        bookGrid.appendChild(card);
    });
    displayedCount += LOAD_BATCH;
}

window.onscroll = () => { if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) { if (displayedCount < filteredBooks.length) loadMore(); } };
ageSelect.onchange = updateFilter;
genreSelect.onchange = updateFilter;
init();
</script>
</body>
</html>
