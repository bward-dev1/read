<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidReads | MAX Browse</title>
<style>
    :root {
        --primary: #4a90e2; --primary-dark: #357abd; --bg-body: #f0f2f5; 
        --card-bg: #ffffff; --text-main: #2d3436; --text-muted: #636e72;
        --glass: rgba(255, 255, 255, 0.15); --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); }
    
    header {
        padding: 50px 20px; text-align: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4a00e0 100%);
        color: white; display: flex; flex-direction: column; align-items: center; gap: 25px; 
    }
    
    .app-toggle {
        display: flex; align-items: center; gap: 10px; 
        background: var(--glass); padding: 6px; border-radius: 50px; backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.2);
    }
    
    .toggle-btn, .sync-label, .clear-btn {
        text-decoration: none; padding: 10px 22px; border-radius: 40px;
        font-size: 0.85rem; font-weight: 700; color: white; border: none; cursor: pointer;
        background: transparent; transition: all 0.3s ease;
    }
    
    .toggle-btn.active { background: white; color: var(--primary-dark); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .sync-label { background: rgba(46, 204, 113, 0.3); border: 1px solid rgba(255,255,255,0.2); }
    .sync-label:hover { background: rgba(46, 204, 113, 0.5); transform: scale(1.02); }
    
    .controls { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
    
    select {
        padding: 14px 24px; border-radius: 16px; background: var(--glass);
        border: 1px solid rgba(255, 255, 255, 0.3); color: white; font-weight: 600; 
        outline: none; cursor: pointer; transition: all 0.3s ease;
    }
    select:hover { background: rgba(255,255,255,0.25); }
    select option { color: #333; }

    #bookGrid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 35px; padding: 40px; max-width: 1400px; margin: 0 auto;
    }
    
    .book-card {
        background: var(--card-bg); border-radius: 24px; box-shadow: var(--shadow);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        overflow: hidden; cursor: pointer; display: flex; flex-direction: column;
    }
    .book-card:hover { transform: translateY(-12px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-bottom: 1px solid #eee; }
    
    .book-info { padding: 22px; flex-grow: 1; display: flex; flex-direction: column; }
    .book-info h4 { margin: 0; font-size: 1.1rem; color: var(--text-main); min-height: 2.8rem; line-height: 1.4; font-weight: 800; }
    .book-info p { margin: 8px 0 0 0; font-size: 0.9rem; color: var(--text-muted); }
    .find-link { color: #4a90e2 !important; font-weight: bold; }

    .badge-container { display: flex; gap: 6px; margin-top: auto; padding-top: 18px; flex-wrap: wrap; }
    .badge { font-size: 0.65rem; font-weight: 800; padding: 5px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .genre-badge { background: #e3f2fd; color: #1976d2; }
    .level-badge { background: #f1f8e9; color: #388e3c; }
</style>
</head>
<body>
    </body>
</html>
