<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidReads | MAX Browse</title>
    <style>
        /* --- CORE STYLES (KidReads v2.1) --- */
        :root {
            --primary: #4a90e2;
            --primary-dark: #357abd;
            --bg-body: #f0f2f5; 
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --glass: rgba(255, 255, 255, 0.2);
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: var(--bg-body); color: var(--text-main); }

        header {
            padding: 40px 20px; text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4a00e0 100%);
            color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; gap: 20px; 
        }

        header h1 { position: relative; z-index: 1; margin: 0; font-size: 3rem; font-weight: 900; letter-spacing: -1.5px; text-shadow: 0 4px 12px rgba(0,0,0,0.3); }

        .app-toggle { position: relative; z-index: 2; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .toggle-container { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); padding: 5px; border-radius: 50px; display: flex; gap: 5px; }
        .toggle-btn, .sync-label, .clear-btn { text-decoration: none; padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; font-weight: 700; color: white; transition: all 0.3s ease; cursor: pointer; border: none; background: transparent; }
        .sync-label { background: rgba(46, 204, 113, 0.3); border: 1px solid rgba(255,255,255,0.2); }
        .toggle-btn.active { background: white; color: var(--primary-dark); }

        .controls { position: relative; z-index: 1; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        select { padding: 12px 20px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.3); background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); font-size: 0.95rem; font-weight: 600; color: white; outline: none; cursor: pointer; }
        select option { background: white; color: black; }

        #bookGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 35px; padding: 50px 40px; max-width: 1400px; margin: 0 auto; }
        .book-card { background: var(--card-bg); border-radius: 20px; box-shadow: var(--shadow); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; overflow: hidden; display: flex; flex-direction: column; animation: cardIn 0.6s ease-out backwards; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .book-card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); }
        .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #eee; }
        .book-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .book-info h4 { margin: 0; font-size: 1.1rem; color: var(--text-main); height: 2.8rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .book-info p { margin: 10px 0 0; font-size: 0.85rem; font-weight: 700; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .badge-container { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .badge { font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .genre-badge { background: #e1f5fe; color: #0288d1; }
        .level-badge { background: #f1f8e9; color: #558b2f; }
        .loading { grid-column: 1 / -1; text-align: center; padding: 100px; font-size: 1.4rem; color: var(--primary-dark); }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: white; border-radius: 24px; max-width: 800px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.3); position: relative; overflow: hidden; display: flex; animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-height: 90vh; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.1); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
        .modal-img-container { width: 40%; background: #f8f9fa; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-img-container img { width: 100%; border-radius: 12px; }
        .modal-details { width: 60%; padding: 40px; overflow-y: auto; }
        .modal-details h2 { margin: 0; font-size: 1.8rem; }
        .modal-summary { font-size: 1rem; color: var(--text-muted); line-height: 1.6; margin-top: 20px; }
        .modal-btn { display: inline-block; background: var(--primary); color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="app-toggle">
        <div class="toggle-container">
            <a href="index.html" class="toggle-btn active">MAX Browse</a>
            <a href="maxsearch.html" class="toggle-btn">Global Search</a>
        </div>
    </div>
    <h1>📚 KidReads MAX</h1>
    <div class="controls">
        <select id="ageSelect">
            <option value="Pre-K">Pre-K - Grade 1</option>
            <option value="1-3">Grades 1 - 3</option>
            <option value="2-5" selected>Grades 2 - 5</option>
            <option value="4-7">Grades 4 - 7</option>
            <option value="7-12">Teens 7 - 12</option>
        </select>
        <select id="genreSelect">
            <option value="">All Genres</option>
            <option value="Adventure">Adventure</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Mystery">Mystery</option>
            <option value="Humor">Humor</option>
            <option value="Graphic Novel">Graphic Novels</option>
            <option value="Scary">Scary</option>
            <option value="Animals">Animals</option>
            <option value="Historical Fiction">History</option>
        </select>
    </div>
</header>

<main id="bookGrid"></main>

<div id="bookModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal(event)">✕</button>
        <div class="modal-img-container"><img id="mCover" src=""></div>
        <div class="modal-details">
            <h2 id="mTitle"></h2>
            <div id="mAuthor" style="color:var(--primary); font-weight:bold; margin-top:5px;"></div>
            <div class="badge-container">
                <span id="mGenre" class="badge genre-badge"></span>
                <span id="mLevel" class="badge level-badge"></span>
            </div>
            <div id="mSummary" class="modal-summary"></div>
            <a id="mLink" href="#" target="_blank" class="modal-btn">🔍 View Source</a>
        </div>
    </div>
</div>

<script>
let allBooks = [];
let filteredBooks = [];
let displayedCount = 0;
const LOAD_BATCH = 40;

const bookGrid = document.getElementById('bookGrid');
const ageSelect = document.getElementById('ageSelect');
const genreSelect = document.getElementById('genreSelect');

// Clean up "Ad-like" text from summaries
function cleanSummary(text) {
    if (!text) return "No description available.";
    return text
        .replace(/Pick a book\. Grow a Reader!/gi, '')
        .replace(/This series is part of Scholastic's early reader line.*grow!/gi, '')
        .replace(/DESCRIPTION/gi, '')
        .replace(/Show More/gi, '')
        .trim();
}

async function init() {
    try {
        const response = await fetch('CLibrary_Final_Gold.json'); 
        allBooks = await response.json();
        updateFilter();
    } catch (e) {
        bookGrid.innerHTML = "<div class='loading'>Database Error. Is CLibrary_Final_Gold.json in the folder?</div>";
    }
}

function updateFilter() {
    bookGrid.innerHTML = "";
    displayedCount = 0;
    const age = ageSelect.value.toLowerCase();
    const genre = genreSelect.value.toLowerCase();

    filteredBooks = allBooks.filter(book => {
        const matchesGenre = genre === "" || (book.genre || "").toLowerCase().includes(genre);
        const matchesAge = age === "" || (book.reading_level || "").toLowerCase().includes(age);
        return matchesGenre && matchesAge;
    });

    loadMore();
}

function showModal(book) {
    document.getElementById('mTitle').innerText = book.title;
    document.getElementById('mAuthor').innerText = `By ${book.author}`;
    document.getElementById('mCover').src = book.cover;
    document.getElementById('mSummary').innerText = cleanSummary(book.summary);
    document.getElementById('mGenre').innerText = book.genre;
    document.getElementById('mLevel').innerText = book.reading_level;
    document.getElementById('mLink').href = book.url;
    document.getElementById('bookModal').classList.add('active');
}

function closeModal() {
    document.getElementById('bookModal').classList.remove('active');
}

function loadMore() {
    const nextBatch = filteredBooks.slice(displayedCount, displayedCount + LOAD_BATCH);
    nextBatch.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.onclick = () => showModal(book);
        card.innerHTML = `
            <img src="${book.cover}" alt="${book.title}" loading="lazy">
            <div class="book-info">
                <h4>${book.title}</h4>
                <p>${book.author}</p>
                <div class="badge-container">
                    <span class="badge genre-badge">${book.genre}</span>
                    <span class="badge level-badge">${book.reading_level}</span>
                </div>
            </div>`;
        bookGrid.appendChild(card);
    });
    displayedCount += LOAD_BATCH;
}

window.onscroll = () => {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
        if (displayedCount < filteredBooks.length) loadMore();
    }
};

ageSelect.onchange = updateFilter;
genreSelect.onchange = updateFilter;
init();
</script>
</body>
</html>
