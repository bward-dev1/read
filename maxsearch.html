<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidReads | Global Search</title>
    <style>
        :root {
            --primary: #4a90e2; --bg-body: #f0f2f5; 
            --card-bg: #ffffff; --text-main: #2d3436; --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); }
        
        header { 
            padding: 60px 20px; text-align: center; 
            background: linear-gradient(135deg, #1e3799 0%, #0c2461 100%); 
            color: white; display: flex; flex-direction: column; align-items: center; gap: 30px; 
        }
        
        .app-toggle { 
            display: flex; gap: 10px; background: rgba(255, 255, 255, 0.1); 
            padding: 6px; border-radius: 50px; backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .toggle-btn { 
            text-decoration: none; padding: 10px 22px; border-radius: 40px; 
            font-size: 0.85rem; font-weight: 700; color: white; transition: 0.3s;
        }
        .toggle-btn.active { background: white; color: #1e3799; }

        .search-container {
            display: flex; gap: 15px; width: 100%; max-width: 900px; 
            background: rgba(255,255,255,0.1); padding: 10px; 
            border-radius: 60px; border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .search-container:focus-within { background: rgba(255,255,255,0.2); border-color: white; }

        #searchBar { 
            flex: 1; padding: 15px 30px; border: none; background: transparent; 
            color: white; font-size: 1.2rem; outline: none; 
        }
        #searchBar::placeholder { color: rgba(255,255,255,0.6); }

        #ageFilter { 
            padding: 0 25px; border-radius: 40px; border: none; 
            background: white; color: #1e3799; font-weight: 700; cursor: pointer; 
        }

        #bookGrid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 35px; padding: 50px 40px; max-width: 1400px; margin: 0 auto; 
        }
        
        .book-card { 
            background: var(--card-bg); border-radius: 24px; box-shadow: var(--shadow); 
            transition: 0.3s ease; overflow: hidden; cursor: pointer;
        }
        .book-card:hover { transform: translateY(-10px); }
        .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        .book-info { padding: 22px; }
        .book-info h4 { margin: 0; font-size: 1.05rem; color: var(--text-main); line-height: 1.3; font-weight: 800; }
        .book-info p { margin: 8px 0 0 0; font-size: 0.9rem; color: #4a90e2; font-weight: bold; }
        
        .load-more { text-align: center; padding: 60px; grid-column: 1 / -1; }
        .btn-load { 
            padding: 18px 50px; background: white; color: #1e3799; border: none; 
            border-radius: 50px; font-weight: 800; cursor: pointer; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .btn-load:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <header>
        <nav class="app-toggle">
            <a href="index.html" class="toggle-btn">MAX Browse</a>
            <a href="maxsearch.html" class="toggle-btn active">Global Search</a>
        </nav>
        <h1>🔍 Global Search</h1>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search by title, author, or series...">
            <select id="ageFilter">
                <option value="all">All Ages</option>
                <option value="1-4">Ages 1-4</option>
                <option value="5-8">Ages 5-8</option>
                <option value="9-12">Ages 9-12</option>
                <option value="13+">Teens 13+</option>
            </select>
        </div>
    </header>
    <main id="bookGrid"></main>
    </body>
</html>
