<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidReads | Global Search</title>
    <style>
        /* (Styles identical to index.html for consistency) */
        :root { --primary: #4a90e2; --primary-dark: #357abd; --bg-body: #f0f2f5; --card-bg: #ffffff; --text-main: #2d3436; --text-muted: #636e72; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); }
        header { padding: 40px 20px; text-align: center; background: linear-gradient(135deg, #667eea, #764ba2); color: white; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        header h1 { margin: 0; font-size: 2.5rem; font-weight: 900; }
        .app-toggle { display: flex; gap: 10px; }
        .toggle-container { background: rgba(255,255,255,0.2); padding: 5px; border-radius: 50px; display: flex; }
        .toggle-btn { text-decoration: none; padding: 8px 20px; border-radius: 40px; color: white; font-weight: bold; }
        .toggle-btn.active { background: white; color: var(--primary-dark); }
        #searchBar { padding: 15px 25px; border-radius: 50px; border: none; width: 400px; max-width: 90%; font-size: 1.1rem; }
        #bookGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 40px; }
        .book-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; }
        .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .book-info { padding: 15px; }
        .badge { font-size: 0.7rem; background: #eee; padding: 3px 8px; border-radius: 5px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 700px; display: flex; border-radius: 20px; overflow: hidden; position: relative; }
        .modal-details { padding: 30px; }
    </style>
</head>
<body>
<header>
    <div class="app-toggle">
        <div class="toggle-container">
            <a href="index.html" class="toggle-btn">Browse</a>
            <a href="maxsearch.html" class="toggle-btn active">Search</a>
        </div>
    </div>
    <h1>🔍 Global Search</h1>
    <input type="text" id="searchBar" placeholder="Search 4,800+ books by title or author...">
</header>

<main id="bookGrid"></main>

<div id="bookModal" class="modal-overlay" onclick="this.classList.remove('active')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-details">
            <h2 id="mTitle"></h2>
            <h4 id="mAuthor" style="color:var(--primary)"></h4>
            <p id="mSummary" style="line-height:1.6; color:#555"></p>
            <a id="mLink" href="#" target="_blank" style="display:inline-block; margin-top:20px; color:var(--primary)">View on Scholastic →</a>
        </div>
    </div>
</div>

<script>
let allBooks = [];
const bookGrid = document.getElementById('bookGrid');
const searchBar = document.getElementById('searchBar');

async function init() {
    const response = await fetch('CLibrary_Final_Gold.json'); 
    allBooks = await response.json();
    bookGrid.innerHTML = "<div style='text-align:center; width:100%; padding:50px;'>Ready! Search for something like 'Dog Man' or 'Harry Potter'.</div>";
}

searchBar.oninput = () => {
    const term = searchBar.value.toLowerCase().trim();
    if (term.length < 2) return;

    const results = allBooks.filter(b => 
        b.title.toLowerCase().includes(term) || 
        b.author.toLowerCase().includes(term)
    ).slice(0, 50);

    bookGrid.innerHTML = "";
    results.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.onclick = () => {
            document.getElementById('mTitle').innerText = book.title;
            document.getElementById('mAuthor').innerText = book.author;
            document.getElementById('mSummary').innerText = book.summary;
            document.getElementById('mLink').href = book.url;
            document.getElementById('bookModal').classList.add('active');
        };
        card.innerHTML = `<img src="${book.cover}"> <div class="book-info"><b>${book.title}</b><br><small>${book.author}</small></div>`;
        bookGrid.appendChild(card);
    });
};

init();
</script>
</body>
</html>
