<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidReads | Global Search</title>
<style>
:root {
    --primary: #4a90e2;
    --primary-dark: #357abd;
    --bg-body: #f0f2f5; 
    --card-bg: #ffffff;
    --text-main: #2d3436;
    --text-muted: #636e72;
    --glass: rgba(255, 255, 255, 0.2);
    --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}
body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); }
header {
    padding: 40px 20px; text-align: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4a00e0 100%);
    color: white; display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.app-toggle {
    display: flex; gap: 10px; background: rgba(255, 255, 255, 0.15);
    padding: 5px; border-radius: 50px; backdrop-filter: blur(10px);
}
.toggle-btn { text-decoration: none; padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; font-weight: 700; color: white; border:none; background:transparent; cursor:pointer;}
.toggle-btn.active { background: white; color: var(--primary-dark); }

#searchBar {
    padding: 15px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.2); color: white; width: 300px; font-size: 1.1rem;
    outline: none; backdrop-filter: blur(10px); transition: all 0.3s ease;
}
#searchBar:focus { width: 450px; background: white; color: black; }
#searchBar::placeholder { color: rgba(255,255,255,0.7); }

#bookGrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto;
}
.book-card {
    background: var(--card-bg); border-radius: 20px; box-shadow: var(--shadow);
    transition: transform 0.3s ease; overflow: hidden; cursor: pointer;
}
.book-card:hover { transform: translateY(-10px); }
.book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
.book-info { padding: 20px; }
/* Fixed: Titles wrap taller without cutting off */
.book-info h4 { margin: 0; font-size: 1.1rem; color: var(--text-main); min-height: 2.8rem; line-height: 1.4; }
.book-info p { margin: 5px 0; font-size: 0.85rem; color: var(--text-muted); }

.badge-container { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
.badge { font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; }
.genre-badge { background: #e1f5fe; color: #0288d1; }
.level-badge { background: #f1f8e9; color: #558b2f; }

.loading { grid-column: 1 / -1; text-align: center; padding: 100px; font-size: 1.4rem; color: var(--primary-dark); }
</style>
</head>
<body>
<header>
    <div class="app-toggle">
        <a href="index.html" class="toggle-btn">MAX Browse</a>
        <a href="maxsearch.html" class="toggle-btn active">Global Search</a>
    </div>
    <h1>🔍 Global Search</h1>
    <input type="text" id="searchBar" placeholder="Search 12,000+ Scholastic books...">
</header>

<main id="bookGrid"></main>

<script>
let allBooks = [];
const bookGrid = document.getElementById('bookGrid');
const searchBar = document.getElementById('searchBar');

async function init() {
    bookGrid.innerHTML = "<div class='loading'>Loading the Global Index... 📡</div>";
    try {
        const response = await fetch('mega_12k_kids.json'); 
        allBooks = await response.json();
        bookGrid.innerHTML = "<div class='loading'>Type above to find a book!</div>";
    } catch (e) {
        bookGrid.innerHTML = "<div class='loading'>Error loading data. Make sure mega_12k_kids.json is uploaded!</div>";
    }
}

searchBar.oninput = () => {
    const term = searchBar.value.toLowerCase().trim();
    if (term.length < 2) {
        bookGrid.innerHTML = "<div class='loading'>Type at least 2 characters...</div>";
        return;
    }

    const results = allBooks.filter(b => 
        (b.title || "").toLowerCase().includes(term) || 
        (b.author || "").toLowerCase().includes(term) ||
        (b.genre || "").toLowerCase().includes(term)
    ).slice(0, 60);

    renderResults(results);
};

function renderResults(results) {
    if (results.length === 0) {
        bookGrid.innerHTML = "<div class='loading'>No books found!</div>";
        return;
    }
    bookGrid.innerHTML = "";
    results.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';
        
        // RESTORED: Google Books exact logic
        let directLink = `https://books.google.com/books?q=intitle:"${encodeURIComponent(book.title)}"`;
        const isbnMatch = (book.cover || "").match(/isbn\/(\d{13})/);
        if (isbnMatch && isbnMatch[1]) {
            directLink = `https://books.google.com/books?vid=ISBN${isbnMatch[1]}`;
        }
        card.onclick = () => window.open(directLink, '_blank');

        let displayAuthor = book.author;
        if (!displayAuthor || displayAuthor.toLowerCase().includes("unknown")) {
            displayAuthor = '<span style="color: var(--primary); font-weight: 600;">🔍 Find Author on Google</span>';
        }

        card.innerHTML = `
            <img src="${book.cover || 'https://via.placeholder.com/200x300'}" alt="${book.title}">
            <div class="book-info">
                <h4>${book.title}</h4>
                <p style="margin: 5px 0; font-size: 0.85rem; color: var(--text-muted);">${displayAuthor}</p>
                <div class="badge-container">
                    <span class="badge genre-badge">${book.genre || 'Story'}</span>
                    <span class="badge level-badge">${book.reading_level || 'General'}</span>
                </div>
            </div>
        `;
        bookGrid.appendChild(card);
    });
}
init();
</script>
</body>
</html>
