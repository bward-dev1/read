<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidReads V2.0 | DEV-CORE</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --dark-core: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            margin: 0; 
            font-family: 'JetBrains Mono', 'Fira Code', monospace; 
            background-color: var(--dark-core); 
            color: var(--text-main);
        }

        /* --- KIDREADS V2.0 HEADER --- */
        header {
            padding: 60px 20px;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
        }

        .dev-badge {
            font-size: 0.7rem;
            background: rgba(0, 210, 255, 0.1);
            color: var(--neon-blue);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .v2-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .v2-title span { color: var(--neon-blue); -webkit-text-fill-color: var(--neon-blue); }

        .nav-system {
            display: flex; gap: 20px; margin-top: 30px;
        }

        .nav-link {
            text-decoration: none; color: var(--text-dim);
            font-size: 0.9rem; font-weight: 600;
            padding: 10px 25px; border-radius: 8px;
            transition: 0.3s; border: 1px solid transparent;
        }

        .nav-link:hover { color: white; background: var(--glass); border-color: rgba(255,255,255,0.1); }
        .nav-link.active { color: var(--neon-blue); border-color: var(--neon-blue); background: rgba(0,210,255,0.05); }

        /* --- CONTROLS --- */
        .dev-controls {
            display: flex; gap: 10px; margin-top: 25px;
        }

        select {
            background: #1e293b; color: white; border: 1px solid #334155;
            padding: 10px 15px; border-radius: 6px; outline: none; font-family: inherit;
        }

        /* --- GRID --- */
        #bookGrid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px; padding: 50px; max-width: 1400px; margin: 0 auto;
        }

        .book-card {
            background: #1e293b; border-radius: 12px; overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .book-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--neon-blue); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; filter: grayscale(20%); transition: 0.3s; }
        .book-card:hover img { filter: grayscale(0%); }

        .book-info { padding: 20px; }
        .book-info h4 { margin: 0; font-size: 0.95rem; color: #f1f5f9; height: 2.6rem; overflow: hidden; }
        .book-info p { margin: 10px 0; font-size: 0.75rem; color: var(--neon-blue); font-weight: bold; }
        
        .type-label { font-size: 0.6rem; color: #475569; border: 1px solid #334155; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div class="dev-badge">Dev-Build v2.0.4 - Purified</div>
    <h1 class="v2-title">KidReads <span>MAX</span></h1>
    
    <nav class="nav-system">
        <a href="index.html" class="nav-link active">//BROWSE_LIBRARY</a>
        <a href="maxsearch.html" class="nav-link">//GLOBAL_QUERY</a>
    </nav>

    <div class="dev-controls">
        <select id="ageFilter">
            <option value="all">ALL_AGES</option>
            <option value="10-13" selected>MIDDLE_GRADE</option>
            <option value="14+">YA_DEEP_LEVEL</option>
        </select>
        <select id="genreFilter">
            <option value="all">ALL_GENRES</option>
            <option value="Adventure">ADVENTURE</option>
            <option value="Science">STEM_DATA</option>
        </select>
    </div>
</header>

<main id="bookGrid"></main>

<script>
let allBooks = [];
async function init() {
    try {
        const res = await fetch('mega.json');
        allBooks = await res.json();
        render();
    } catch(e) { document.getElementById('bookGrid').innerHTML = "DB_SYNC_ERROR: mega.json not found."; }
}

function render() {
    const grid = document.getElementById('bookGrid');
    grid.innerHTML = '';
    const age = document.getElementById('ageFilter').value;
    
    // Quick filter logic for middle grade
    const filtered = allBooks.filter(b => {
        if (age === '10-13') return (b.reading_level || '').includes('4') || (b.reading_level || '').includes('Middle');
        return true;
    }).slice(0, 100);

    filtered.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.onclick = () => {
            const isbn = (book.cover || '').match(/isbn\/(\d{13})/);
            window.open(isbn ? `https://books.google.com/books?vid=ISBN${isbn[1]}` : `https://books.google.com/books?q=${encodeURIComponent(book.title)}`, '_blank');
        };
        card.innerHTML = `
            <img src="${book.cover}">
            <div class="book-info">
                <h4>${book.title}</h4>
                <p>${book.author === 'Unknown' ? 'AUTHOR_MISSING' : book.author.toUpperCase()}</p>
                <span class="type-label">${book.genre || 'OBJECT'}</span>
            </div>
        `;
        grid.appendChild(card);
    });
}

document.getElementById('ageFilter').onchange = render;
init();
</script>
</body>
</html>
